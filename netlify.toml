# netlify.toml — Beansprout (monorepo)
# ──────────────────────────────────────────────────────────────────────────────
# Netlify hosts ONLY the serverless form functions for this project
# (enquiry + flash claim + newsletter). The marketing site itself is served from
# GitHub Pages (see .github/workflows/deploy-web.yml). CORS is set INSIDE the
# functions (apps/functions/netlify/functions/_shared.js), not here — see below.
#
# This file lives at the repo root. The `base` directory below scopes the whole
# Netlify build to the functions workspace, so a frontend-only change never
# triggers (or redeploys to) Netlify.
#
# ── One-time Netlify dashboard setup ─────────────────────────────────────────
#   Site configuration → Build & deploy → Build settings:
#     • Base directory       = apps/functions
#     • (npm workspaces install runs from the repo root automatically)
#   With a base directory set, Netlify only rebuilds when files under
#   apps/functions/** change — which is exactly the deploy isolation we want.
# ──────────────────────────────────────────────────────────────────────────────

[build]
  # Scope the entire build to the functions workspace.
  base = "apps/functions"
  # No site to compile here — the static publish dir is just a placeholder so
  # Netlify has something to deploy next to the functions.
  command = "echo 'Beansprout: functions-only deploy — no site build'"
  publish = "public"
  functions = "netlify/functions"

[functions]
  # The functions use `export async function handler` (ES modules).
  node_bundler = "esbuild"

# Keep the netlify.app mirror out of search engines. Netlify only exists here to
# host the serverless functions (and is an incidental full-site mirror); the
# canonical, indexable site is beansprout.ink on GitHub Pages. This noindex header
# applies ONLY to responses Netlify serves, so it never affects the apex. Every
# page's <link rel="canonical"> already points at beansprout.ink as a second signal.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# CORS is handled INSIDE the functions via netlify/functions/_shared.js (shared by
# both enquiry + newsletter): each echoes an allowlisted Origin per request and
# answers the OPTIONS preflight itself. We do NOT set Access-Control-Allow-Origin
# here — a static '*' would conflict with the function's dynamic header (two ACAO
# values and the browser rejects the response).
