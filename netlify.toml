# netlify.toml — Beansprout
# ──────────────────────────────────────────────────────────────────────────────
# Netlify hosts ONLY the enquiry function for this project; the site itself is
# served from GitHub Pages. This file tells Netlify where the function lives and
# sets CORS headers so the GitHub Pages origin can POST to it.
#
# Lives at the repo root, alongside package.json.
# ──────────────────────────────────────────────────────────────────────────────

# Netlify also builds the Vite site here, so the netlify.app URL is a working
# mirror — but beansprout.ink (GitHub Pages) stays the canonical site. The build
# guarantees the function bundle is published on every deploy.
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  # The function uses `export async function handler` (ES module).
  node_bundler = "esbuild"

# CORS is handled INSIDE the function (netlify/functions/enquiry.js): it echoes an
# allowlisted Origin per request and answers the OPTIONS preflight itself. We do NOT
# set Access-Control-Allow-Origin here — a static '*' would conflict with the
# function's dynamic header (two ACAO values and the browser rejects the response).
