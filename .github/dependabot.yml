# Keep GitHub Actions on supported (non-deprecated) runtimes automatically, so
# we never again fall behind a forced Node-runtime bump. Scoped to actions only;
# all bumps are batched into one weekly PR to keep the noise down.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
