# Deploy the Cloudflare Worker (apps/functions) — applies D1 migrations, then deploys.
#
# Path-gated: only runs when the functions workspace (or this workflow / lockfile)
# changes — a frontend-only change never triggers a Worker deploy. Mirrors
# deploy-web.yml (Pages); together they are the "two independent deploys".
#
# One-time setup: mint a Cloudflare API token (dashboard → My Profile → API Tokens
# → Create Token → "Edit Cloudflare Workers" template — it includes Workers Scripts
# + D1 edit) and add it as a repo secret:
#   Settings → Secrets and variables → Actions → Secrets → New → CLOUDFLARE_API_TOKEN
# (If your token can see more than one account, also add CLOUDFLARE_ACCOUNT_ID and
# uncomment the env lines below.)
#
# This triggers only on push to main / manual dispatch — never on PR or other
# attacker-controllable input — so the token is never exposed to untrusted code.

name: Deploy Worker to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'apps/functions/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/functions
          command: d1 migrations apply beansprout --remote
        # env:
        #   CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/functions
          command: deploy
        # env:
        #   CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
