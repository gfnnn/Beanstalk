# Build the Vite site (apps/web) and deploy it to GitHub Pages.
#
# Path-gated: this only runs when the frontend workspace (or this workflow, or
# the lockfile) changes — a functions-only change never triggers a Pages
# redeploy. The functions deploy separately to Netlify (see netlify.toml).
#
# One-time setup: GitHub repo → Settings → Pages → Build and deployment →
# Source = "GitHub Actions". Then set the function URL so the enquiry form is
# wired at build time: Settings → Secrets and variables → Actions → Variables →
# New variable → VITE_ENQUIRY_FN_URL = https://<your-site>.netlify.app/.netlify/functions/enquiry

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_ENQUIRY_FN_URL: ${{ vars.VITE_ENQUIRY_FN_URL }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
