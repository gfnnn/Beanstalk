<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Beansprout.ink — Portfolio of custom botanical and illustrative tattoo work." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
  <title>Work — Beansprout.ink</title>
</head>
<body>

  <header class="nav is-scrolled" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo" aria-label="Beansprout.ink home">
        <span class="nav__logo-text">Beansprout</span><span class="nav__logo-dot">.ink</span>
      </a>
      <nav class="nav__links" aria-label="Main navigation">
        <a href="/portfolio/" class="nav__link">Work</a>
        <a href="/about/"     class="nav__link">About</a>
        <a href="/booking/"   class="nav__link">Booking</a>
        <a href="/contact/"   class="nav__link">Contact</a>
        <a href="/booking/"   class="nav__link nav__link--book">Book Now</a>
      </nav>
      <a href="/booking/" class="btn btn--accent nav__cta">Book Now</a>
      <button class="nav__toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-main">

    <section class="page-hero">
      <div class="container">
        <span class="section-label">Portfolio</span>
        <h1 class="page-hero__title">The Work</h1>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="gallery gallery--masonry">
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:3/4;min-height:auto"></div></div>
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:4/5;min-height:auto"></div></div>
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:3/4;min-height:auto"></div></div>
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:1;min-height:auto"></div></div>
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:4/5;min-height:auto"></div></div>
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:3/4;min-height:auto"></div></div>
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:1;min-height:auto"></div></div>
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:5/6;min-height:auto"></div></div>
          <div class="gallery__item"><div class="gallery__placeholder" style="aspect-ratio:3/4;min-height:auto"></div></div>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <div class="footer__brand">
          <a href="/" class="nav__logo"><span class="nav__logo-text">Beansprout</span><span class="nav__logo-dot">.ink</span></a>
          <p class="footer__tagline">Custom tattoo — botanical &amp; illustrative.</p>
        </div>
        <nav class="footer__nav" aria-label="Footer navigation">
          <a href="/portfolio/">Work</a>
          <a href="/about/">About</a>
          <a href="/booking/">Booking</a>
          <a href="/contact/">Contact</a>
        </nav>
        <div class="footer__social">
          <a href="#" class="footer__social-link" rel="noopener noreferrer">Instagram</a>
          <a href="#" class="footer__social-link" rel="noopener noreferrer">TikTok</a>
        </div>
      </div>
      <div class="footer__bottom"><span>&copy; 2026 Beansprout.ink</span></div>
    </div>
  </footer>

  <script type="module" src="/src/js/main.js"></script>

</html>
